{% extends "base.html" %}
{% block content %}
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <label>Service name</label>
    <input type="text" name="service_name" placeholder="e.g. GitHub, Netflix" required>
    <label>Username / Email</label>
    <input type="text" name="service_username" placeholder="user@example.com" autocomplete="off" required>
    <label>Password</label>
    <div class="pw-wrap">
        <input type="password" id="pw" name="password" autocomplete="off" required>
        <button type="button" class="eye-btn" onclick="toggleEye('pw', this)">show</button>
    </div>
    <button type="submit" style="width:100%;">Save</button>
</form>
<p style="text-align:center;"><a href="{{ url_for('index') }}">&larr; Back</a></p>

<script>
function toggleEye(id, btn) {
    var input = document.getElementById(id);
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'hide';
    } else {
        input.type = 'password';
        btn.textContent = 'show';
    }
}
</script>
{% endblock %}
