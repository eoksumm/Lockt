{% extends "base.html" %}
{% block content %}
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <label>Service name</label>
    <input type="text" name="service_name" placeholder="e.g. GitHub, Netflix" required>
    <label>Username / Email</label>
    <input type="text" name="service_username" placeholder="user@example.com" autocomplete="off" required>
    <label>Password</label>
    <input type="password" name="password" autocomplete="off" required>
    <button type="submit" style="width:100%;">Save</button>
</form>
<p style="text-align:center;"><a href="{{ url_for('index') }}">&larr; Back</a></p>
{% endblock %}
