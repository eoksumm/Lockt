{% extends "base.html" %}
{% block content %}
<div style="background:#F9F9F9;border:1.5px solid #E5E5EA;border-radius:10px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
    <code id="gen-pw" style="font-size:15px;font-family:monospace;color:#1C1C1E;letter-spacing:1px;word-break:break-all;">{{ new_password }}</code>
    <button id="copy-btn" type="button" onclick="doCopy()" class="btn-ghost btn" style="flex-shrink:0;padding:7px 14px;font-size:13px;">Copy</button>
</div>
<a class="btn btn-ghost" href="{{ url_for('generate') }}" style="display:block;text-align:center;margin-bottom:4px;">New password</a>
<p style="text-align:center;"><a href="{{ url_for('index') }}">&larr; Back</a></p>

<script>
function doCopy() {
    var pw = document.getElementById('gen-pw').textContent;
    navigator.clipboard.writeText(pw).then(function() {
        var btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.style.color = '#34C759';
        setTimeout(function() {
            btn.textContent = 'Copy';
            btn.style.color = '';
        }, 2000);
    });
}
</script>
{% endblock %}
