{% extends "base.html" %}
{% block content %}
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <label>Username</label>
    <input type="text" name="username" autocomplete="username" required>
    <label>Password</label>
    <div class="pw-wrap">
        <input type="password" id="pw" name="password" autocomplete="new-password" required>
        <button type="button" class="eye-btn" onclick="toggleEye('pw', this)">show</button>
    </div>
    <button type="submit" style="width:100%;">Create account</button>
</form>
<p style="text-align:center;">Already have an account? <a href="{{ url_for('login_page') }}">Log in</a></p>

<script>
function toggleEye(id, btn) {
    var input = document.getElementById(id);
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'hide';
    } else {
        input.type = 'password';
        btn.textContent = 'show';
    }
}
</script>
{% endblock %}
